<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReachDesk CRM — CRM for Freelancers & Agency Owners</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
</head>

<body>
  <div id="root">
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0D1117;color:#FFFFFF;gap:1rem;">
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .loading-spinner {
          border: 3px solid rgba(91, 143, 185, 0.1);
          border-top: 3px solid #5B8FB9;
          border-radius: 50%;
          width: 36px;
          height: 36px;
          animation: spin 1s linear infinite;
        }
        .loading-text {
          font-family: 'Mattone', serif;
          font-size: 0.75rem;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #FFFFFF;
        }
      </style>
      <div class="loading-spinner"></div>
      <div class="loading-text">REACHDESK</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
